<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" role="img" aria-labelledby="title desc">
  <title id="title">Task Bias Curator workflow</title>
  <desc id="desc">A curator agent observes the sitemap and work history, then updates meta-rules for orchestrator, developer, and validator agents.</desc>
  <rect width="980" height="360" fill="#0f172a"/>
  <rect x="48" y="44" width="884" height="272" rx="18" fill="#111827" stroke="#334155" stroke-width="2"/>
  <rect x="365" y="28" width="250" height="64" rx="12" fill="#f8fafc"/>
  <text x="490" y="56" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#0f172a">Curator Agent</text>
  <text x="490" y="76" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">second-order control</text>

  <rect x="86" y="136" width="188" height="72" rx="12" fill="#dbeafe" stroke="#60a5fa" stroke-width="2"/>
  <text x="180" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#172554">AI Sitemap</text>
  <text x="180" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#1e3a8a">state + evidence</text>

  <rect x="322" y="136" width="188" height="72" rx="12" fill="#dcfce7" stroke="#4ade80" stroke-width="2"/>
  <text x="416" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#14532d">Orchestrator</text>
  <text x="416" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#166534">selects bounded work</text>

  <rect x="558" y="136" width="188" height="72" rx="12" fill="#fef3c7" stroke="#fbbf24" stroke-width="2"/>
  <text x="652" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="700" fill="#713f12">Developer</text>
  <text x="652" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#92400e">executes assignment</text>

  <rect x="794" y="136" width="102" height="72" rx="12" fill="#fee2e2" stroke="#f87171" stroke-width="2"/>
  <text x="845" y="166" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#7f1d1d">Validator</text>
  <text x="845" y="187" text-anchor="middle" font-family="Arial, sans-serif" font-size="11" fill="#991b1b">scores evidence</text>

  <path d="M274 172 H322" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M510 172 H558" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M746 172 H794" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <path d="M845 208 C845 280 180 280 180 208" stroke="#94a3b8" stroke-width="3" fill="none" marker-end="url(#arrow)"/>

  <path d="M440 92 C360 118 270 118 205 136" stroke="#38bdf8" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <path d="M540 92 C620 116 720 116 818 136" stroke="#38bdf8" stroke-width="3" fill="none" marker-end="url(#arrowBlue)"/>
  <text x="490" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" fill="#cbd5e1">Curator updates policy weights, validation trust, schema extensions, and provisional nodes.</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#38bdf8"/>
    </marker>
  </defs>
</svg>
