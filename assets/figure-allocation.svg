<svg xmlns="http://www.w3.org/2000/svg" width="980" height="420" viewBox="0 0 980 420" role="img" aria-labelledby="title desc">
  <title id="title">Task allocation concentration chart</title>
  <desc id="desc">A bar chart comparing biased and balanced work allocation across project nodes.</desc>
  <rect width="980" height="420" fill="#f8fafc"/>
  <text x="54" y="54" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#0f172a">Work Allocation Across 100 Project Nodes</text>
  <text x="54" y="82" font-family="Arial, sans-serif" font-size="14" fill="#475569">Task bias concentrates cycles on visible nodes while unvisited nodes look falsely quiet.</text>

  <line x1="82" y1="342" x2="898" y2="342" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="82" y1="126" x2="82" y2="342" stroke="#cbd5e1" stroke-width="2"/>
  <text x="82" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">0</text>
  <text x="898" y="370" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569">100 nodes</text>
  <text x="38" y="132" text-anchor="middle" font-family="Arial, sans-serif" font-size="12" fill="#475569" transform="rotate(-90 38 132)">work cycles</text>

  <rect x="110" y="154" width="18" height="188" rx="3" fill="#ef4444"/>
  <rect x="132" y="162" width="18" height="180" rx="3" fill="#ef4444"/>
  <rect x="154" y="142" width="18" height="200" rx="3" fill="#ef4444"/>
  <rect x="176" y="176" width="18" height="166" rx="3" fill="#f97316"/>
  <rect x="198" y="196" width="18" height="146" rx="3" fill="#f97316"/>
  <rect x="220" y="170" width="18" height="172" rx="3" fill="#f97316"/>
  <rect x="242" y="210" width="18" height="132" rx="3" fill="#f59e0b"/>
  <rect x="264" y="232" width="18" height="110" rx="3" fill="#f59e0b"/>
  <rect x="286" y="218" width="18" height="124" rx="3" fill="#f59e0b"/>
  <rect x="308" y="250" width="18" height="92" rx="3" fill="#f59e0b"/>

  <g fill="#dbeafe">
    <rect x="350" y="326" width="12" height="16" rx="2"/>
    <rect x="370" y="326" width="12" height="16" rx="2"/>
    <rect x="390" y="326" width="12" height="16" rx="2"/>
    <rect x="410" y="326" width="12" height="16" rx="2"/>
    <rect x="430" y="326" width="12" height="16" rx="2"/>
    <rect x="450" y="326" width="12" height="16" rx="2"/>
    <rect x="470" y="326" width="12" height="16" rx="2"/>
    <rect x="490" y="326" width="12" height="16" rx="2"/>
    <rect x="510" y="326" width="12" height="16" rx="2"/>
    <rect x="530" y="326" width="12" height="16" rx="2"/>
    <rect x="550" y="326" width="12" height="16" rx="2"/>
    <rect x="570" y="326" width="12" height="16" rx="2"/>
    <rect x="590" y="326" width="12" height="16" rx="2"/>
    <rect x="610" y="326" width="12" height="16" rx="2"/>
    <rect x="630" y="326" width="12" height="16" rx="2"/>
    <rect x="650" y="326" width="12" height="16" rx="2"/>
    <rect x="670" y="326" width="12" height="16" rx="2"/>
    <rect x="690" y="326" width="12" height="16" rx="2"/>
    <rect x="710" y="326" width="12" height="16" rx="2"/>
    <rect x="730" y="326" width="12" height="16" rx="2"/>
    <rect x="750" y="326" width="12" height="16" rx="2"/>
    <rect x="770" y="326" width="12" height="16" rx="2"/>
    <rect x="790" y="326" width="12" height="16" rx="2"/>
    <rect x="810" y="326" width="12" height="16" rx="2"/>
    <rect x="830" y="326" width="12" height="16" rx="2"/>
  </g>

  <rect x="108" y="104" width="224" height="32" rx="16" fill="#fee2e2"/>
  <text x="220" y="126" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#991b1b">highly visible subset</text>
  <rect x="350" y="288" width="514" height="32" rx="16" fill="#eff6ff"/>
  <text x="607" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="700" fill="#1e40af">quiet, under-inspected surface area</text>

  <rect x="640" y="118" width="252" height="106" rx="12" fill="#ffffff" stroke="#cbd5e1"/>
  <circle cx="664" cy="148" r="7" fill="#ef4444"/>
  <text x="682" y="153" font-family="Arial, sans-serif" font-size="13" fill="#334155">Repeated edits and tests</text>
  <circle cx="664" cy="178" r="7" fill="#dbeafe"/>
  <text x="682" y="183" font-family="Arial, sans-serif" font-size="13" fill="#334155">Low or missing inspection</text>
  <text x="664" y="210" font-family="Arial, sans-serif" font-size="12" fill="#64748b">Absence of failure is not completion.</text>
</svg>
